<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="Template.css">
  <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
  <link href="https://unpkg.com/nes.css/css/nes.css" rel="stylesheet" /> 
  
  <script src="Fudge/FudgeCore.js"></script>
  <script src="FudgeStory/FudgeStory.js"></script>
  <script src="./Build/Template.js"></script>
  <script  src="http://ajax.googleapis.com/ajax/libs/jquery/1/jquery.min.js"></script>
  <title>Gamename</title>
  <splash src="Images/Splash.png" />
</head>

<body>
  <scene id="form">

    <dialog type="splash" open>
      <img id="FudgeStoryLogo" theme="dark" /> <!-- use "light" or "dark" -->
      <p>
        Design your splash screen here. Reposition and rescale the logo above, but do not remove.
      </p>
    </dialog>

    <canvas ></canvas>


    <speech>
      <name>The name of the character speaking</name>
      <content>The text the character says</content>
    </speech>

    <dialog type="inventory" >
      <button type="button" class="nes-btn is-warning">Close</button>
      <ul></ul>
    </dialog>

    <dialog type="text">
      The content of a page of text for reading
    </dialog>

  </scene>
</body>
</html>
